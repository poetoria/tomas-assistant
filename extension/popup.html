<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Tomas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f1f;
      background: #0f0f0f;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-left svg { color: #22c55e; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: #1f1f1f; color: #999; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: #555;
      gap: 8px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 12px; }
    .empty-state .subtitle { font-size: 11px; color: #444; }

    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.6;
      word-wrap: break-word;
    }
    .msg.user .msg-bubble {
      background: #22c55e;
      color: #000;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: #1a1a1a;
      color: #d4d4d4;
      border-bottom-left-radius: 4px;
    }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble code {
      background: rgba(255,255,255,0.1);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }

    .loading-dots {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
    }
    .loading-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #555;
      animation: pulse 1s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    .input-area {
      padding: 10px 12px;
      border-top: 1px solid #1f1f1f;
      background: #0f0f0f;
    }
    .input-form { display: flex; gap: 8px; }
    .input-form input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #e5e5e5;
      outline: none;
    }
    .input-form input:focus { border-color: #22c55e44; }
    .input-form input::placeholder { color: #555; }
    .send-btn {
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #16a34a; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .settings-bar {
      padding: 8px 16px;
      border-top: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .settings-bar input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      color: #e5e5e5;
      outline: none;
    }
    .settings-bar input::placeholder { color: #555; }
    .settings-bar button {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #999;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .settings-bar button:hover { background: #222; color: #ccc; }
    .status { font-size: 10px; color: #444; padding: 4px 16px 0; }
    .status.connected { color: #22c55e88; }
    .status.error { color: #ef444488; }

    .open-app-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #555;
      text-decoration: none;
      padding: 4px 16px 8px;
    }
    .open-app-btn:hover { color: #22c55e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
      <h1>Ask Tomas</h1>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clear-btn" title="Clear chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      </button>
      <button class="icon-btn" id="settings-toggle" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
      <p>Quick style guide help</p>
      <p class="subtitle">Ask about tone, terminology, formatting, or compliance.</p>
    </div>
  </div>

  <div class="settings-bar" id="settings-bar" style="display:none;">
    <input type="text" id="app-url" placeholder="Tomas app URL (e.g. https://tomas.lovable.app)">
    <button id="save-url">Save</button>
  </div>

  <div class="input-area">
    <form class="input-form" id="chat-form">
      <input type="text" id="chat-input" placeholder="Ask a question..." autocomplete="off">
      <button type="submit" class="send-btn" id="send-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
      </button>
    </form>
  </div>

  <div id="status-line" class="status"></div>
  <a href="#" id="open-app" class="open-app-btn" style="display:none;">Open full app →</a>

  <script src="popup.js"></script>
</body>
</html>
